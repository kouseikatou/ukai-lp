name: Deploy standalone site to XServer (ukai-kogyo.jp)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'xserver-build/**'
      - '.github/workflows/deploy-standalone.yml'

concurrency:
  group: deploy-xserver-standalone
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate inc/config.php from secrets
        env:
          SERVICE_ID: ${{ secrets.MICROCMS_SERVICE_ID }}
          API_KEY: ${{ secrets.MICROCMS_API_KEY }}
        run: |
          cat > xserver-build/inc/config.php <<PHP
          <?php
          return array(
              'service_id' => '${SERVICE_ID}',
              'api_key'    => '${API_KEY}',
              'cache_ttl'  => 600,
              'site_url'   => 'https://ukai-kogyo.jp',
          );
          PHP
          echo "config.php generated"

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.XSERVER_SSH_KEY }}
          HOST: ${{ secrets.XSERVER_HOST }}
          PORT: ${{ secrets.XSERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/xserver
          chmod 600 ~/.ssh/xserver
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Compute docroot and deploy
        env:
          USER: ${{ secrets.XSERVER_USER }}
          HOST: ${{ secrets.XSERVER_HOST }}
          PORT: ${{ secrets.XSERVER_PORT }}
          THEME_PATH: ${{ secrets.XSERVER_THEME_PATH }}
          UKAIJP_DOCROOT: ${{ secrets.XSERVER_UKAIJP_DOCROOT }}
        run: |
          # ukai-kogyo.jp の公開ディレクトリを決定。
          # 明示シークレットがあれば優先、無ければ XServer 標準構成から算出。
          if [ -n "$UKAIJP_DOCROOT" ]; then
            DEST="$UKAIJP_DOCROOT"
          else
            OLD="${THEME_PATH%%/wp-content/*}"             # /home/acct/<olddomain>/public_html
            ACCT_HOME="$(dirname "$(dirname "$OLD")")"      # /home/acct
            DEST="$ACCT_HOME/ukai-kogyo.jp/public_html"
          fi
          echo "Deploy target resolved."

          SSH_OPTS="-i ~/.ssh/xserver -p $PORT \
            -o PubkeyAcceptedAlgorithms=+ssh-rsa \
            -o HostKeyAlgorithms=+ssh-rsa \
            -o StrictHostKeyChecking=no"

          # ガード: 公開ディレクトリが存在するか確認
          if ! ssh $SSH_OPTS "$USER@$HOST" "test -d '$DEST'"; then
            echo "::group::Discovered directory layout"
            ssh $SSH_OPTS "$USER@$HOST" "echo '[find ukai-kogyo.jp]'; find /home -maxdepth 4 -type d -name 'ukai-kogyo.jp' 2>/dev/null; echo '[find public_html docroots]'; find /home -maxdepth 4 -type d -name 'public_html' 2>/dev/null" || true
            echo "::endgroup::"
            echo '::error::ukai-kogyo.jp の公開ディレクトリが見つかりません。上のログの実パスを確認してください'
            exit 1
          fi

          rsync -avz \
            -e "ssh $SSH_OPTS" \
            --exclude='.well-known/' \
            --exclude='cache/' \
            --exclude='.DS_Store' \
            --exclude='README-deploy.md' \
            --exclude='config.sample.php' \
            xserver-build/ \
            "$USER@$HOST:$DEST/"

      - name: Summary
        run: echo "Deployed standalone site to https://ukai-kogyo.jp/"
